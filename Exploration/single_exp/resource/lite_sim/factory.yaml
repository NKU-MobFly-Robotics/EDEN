map_config:
  map_file: "large_tunnel.pcd"
  map_dimension: 2

  # Initial position and orientation of the robot under the world frame
  init_x: 0.0
  init_y: 0.0
  init_z: 1.3
  init_yaw: 0.0

  map_size:
    # Size of the map in meters
    map_min_x: -50.0
    map_min_y: -50.0
    map_min_z: -0.0
    map_max_x: 50.0
    map_max_y: 50.0
    map_max_z: 30.0

    # Size of the task bbox in meters
    # If not set, the whole map will be used
    box_min_x: -20.3
    box_min_y: -20.3
    box_min_z: -1.0
    box_max_x: 20.3
    box_max_y: 20.3
    box_max_z: 20.0

    # Size of the visualization bbox in meters
    # If not set, the whole map will be used
    vbox_min_x: -20.0
    vbox_min_y: -20.0
    vbox_min_z: -1.0
    vbox_max_x: 20.0
    vbox_max_y: 20.0
    vbox_max_z: 15.0
